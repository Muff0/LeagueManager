  /api/v1/games/library_ai_detection/{library_owner}/:
    get:
      operationId: games_library_ai_detection_list
      description: |-
        AI Detection List view that sources games from a specific user's library instead of recently played games.

        This view is similar to AIDetectionList but filters games based on library ownership.
        It requires the 'library_owner' path parameter and optionally accepts a 'collection' parameter.

        URL Parameters:
            library_owner (int): Required. The ID of the user whose library to search
            collection (int): Optional. The ID of a specific collection within the library.
                             If not provided, sources from the default collection (collection_id=None).

        Query Parameters:
            player (int): Optional. Filter games to only include those involving this player ID

        Example usage:
            GET /api/v1/games/library_ai_detection/12345/          # Default collection
            GET /api/v1/games/library_ai_detection/12345/67890/    # Specific collection
            GET /api/v1/games/library_ai_detection/12345/?player=11111
            GET /api/v1/games/library_ai_detection/12345/67890/?player=11111

        URL Mapping:
            The library_owner and optional collection parameters correspond to the URL structure:
            https://online-go.com/library/{library_owner}           # Default collection
            https://online-go.com/library/{library_owner}/{collection}  # Specific collection
            For example: https://online-go.com/library/427361 maps to library_owner=427361 (default collection)
            And: https://online-go.com/library/427361/12443 maps to:
            - library_owner=427361
            - collection=12443

        Permissions:
            - User must be logged in
            - User must be a moderator or have AI detector powers
      parameters:
      - in: path
        name: library_owner
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - games
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGameAIDetectionListList'
          description: ''
