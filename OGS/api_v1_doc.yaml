      parameters:
      - name: created
        required: false
        in: query
        description: Filter by created
        schema:
          type: string
      - name: creator
        required: false
        in: query
        description: Filter by creator
        schema:
          type: string
      - name: name
        required: false
        in: query
        description: Filter by name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - game_records
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
          description: ''
    post:
      operationId: game_records_create
      description: List or create game records (manually entered games, not played
        on OGS).
      tags:
      - game_records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
          application/x-www-form-urlencoded:
            schema:
