openapi: 3.0.3
info:
  title: Online-Go.com API
  version: 1.0.0
  description: REST API for Online-Go.com
paths:
  /api/v1/:
    get:
      operationId: root_retrieve
      description: list top level resources
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/ai_reviews/{id}/:
    put:
      operationId: ai_reviews_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9a-zA-Z-]+$
        required: true
      tags:
      - ai_reviews
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/announcements/:
    get:
      operationId: announcements_retrieve
      description: List active announcements or create a new announcement.
      tags:
      - announcements
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: announcements_create
      description: List active announcements or create a new announcement.
      tags:
      - announcements
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/announcements/{id}/:
    get:
      operationId: announcements_retrieve_2
      description: Retrieve, update, or delete a specific announcement.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - announcements
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
    put:
      operationId: announcements_update
      description: Update an existing announcement
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - announcements
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: announcements_destroy
      description: Retrieve, update, or delete a specific announcement.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - announcements
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/announcements/history/:
    get:
      operationId: announcements_history_list
      description: List all historical announcements.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - announcements
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMinimalAnnouncementList'
          description: ''
  /api/v1/challenges/:
    get:
      operationId: challenges_list
      description: List open challenges or create a new open challenge (custom game).
      parameters:
      - name: challenger
        required: false
        in: query
        description: Filter by challenger
        schema:
          type: string
      - name: challenger_color
        required: false
        in: query
        description: Filter by challenger_color
        schema:
          type: string
      - name: group
        required: false
        in: query
        description: Filter by group
        schema:
          type: string
      - name: max_ranking
        required: false
        in: query
        description: Filter by max_ranking
        schema:
          type: string
      - name: min_ranking
        required: false
        in: query
        description: Filter by min_ranking
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOpenChallengeList'
          description: ''
    post:
      operationId: challenges_create
      description: List open challenges or create a new open challenge (custom game).
      tags:
      - challenges
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenChallenge'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OpenChallenge'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OpenChallenge'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenChallenge'
          description: ''
    put:
      operationId: challenges_update
      description: List open challenges or create a new open challenge (custom game).
      tags:
      - challenges
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenChallenge'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OpenChallenge'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OpenChallenge'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenChallenge'
          description: ''
  /api/v1/challenges/{id}/:
    get:
      operationId: challenges_retrieve
      description: Retrieve or delete an open challenge.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenChallenge'
          description: ''
    delete:
      operationId: challenges_destroy
      description: Retrieve or delete an open challenge.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/challenges/{id}/accept/:
    post:
      operationId: challenges_accept_create
      description: Accept an open challenge (custom game), starting the game.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/challenges/{id}/join/:
    put:
      operationId: challenges_join_update
      description: Join or leave a Rengo (team Go) challenge.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: challenges_join_destroy
      description: Join or leave a Rengo (team Go) challenge.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/challenges/{id}/start/:
    post:
      operationId: challenges_start_create
      description: Start a Rengo game from a challenge once teams are ready.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/challenges/{id}/team/:
    put:
      operationId: challenges_team_update
      description: Manage team assignments for a Rengo challenge.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/challenges/uu-{uuid}/:
    get:
      operationId: challenges_uu__retrieve
      description: Look up an open challenge by its UUID (for invite links).
      parameters:
      - in: path
        name: uuid
        schema:
          type: string
          pattern: ^[a-zA-Z0-9]+$
        required: true
      tags:
      - challenges
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/data/self_reported_account_links/{secret}:
    get:
      operationId: data_self_reported_account_links_retrieve
      parameters:
      - in: path
        name: secret
        schema:
          type: string
          pattern: ^[a-z]+$
        required: true
      tags:
      - data
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/demos/:
    get:
      operationId: demos_list
      description: List or create demo boards for teaching and analysis.
      parameters:
      - name: black
        required: false
        in: query
        description: Filter by black
        schema:
          type: string
      - name: created
        required: false
        in: query
        description: Filter by created
        schema:
          type: string
      - name: name
        required: false
        in: query
        description: Filter by name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: owner
        required: false
        in: query
        description: Filter by owner
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: white
        required: false
        in: query
        description: Filter by white
        schema:
          type: string
      tags:
      - demos
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
          description: ''
    post:
      operationId: demos_create
      description: List or create demo boards for teaching and analysis.
      tags:
      - demos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Review'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Review'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
  /api/v1/demos/{id}/:
    get:
      operationId: demos_retrieve
      description: Retrieve a specific demo board.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - demos
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
  /api/v1/game_records/:
    get:
      operationId: game_records_list
      description: List or create game records (manually entered games, not played
