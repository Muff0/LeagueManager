          type: string
          readOnly: true
        matched_player_id:
          type: integer
          nullable: true
          description: |-
            Returns the ID of the player that triggered the filter match.

            When filtering by player, this returns which player (black or white) in the game
            matches the filter criteria. This allows the frontend to correctly identify
            the "target" player even when viewing BID-matched accounts.

            Returns:
                Player ID that triggered the match, or None if no player filter is active
          readOnly: true
        is_bid_match:
          type: boolean
          description: |-
            Returns True if this game was included due to BID matching (vs direct player match).

            This allows the frontend to visually distinguish games where the filtered player
            actually played vs games from a BID-matched account.

            Returns:
                True if the matched player is different from the original filter player
          readOnly: true
