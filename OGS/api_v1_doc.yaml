          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Review'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
  /api/v1/game_records/{id}/:
    get:
      operationId: game_records_retrieve
      description: Retrieve detailed information about a specific game.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
