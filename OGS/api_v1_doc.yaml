  /api/v1/kibitz/directory/:
    get:
      operationId: kibitz_directory_retrieve
      description: |-
        GET /api/v1/kibitz/directory - curated room listing for the rail.

        Returns rooms suitable for the directory view: preset and broadcast rooms
        (always shown as fixed entry points), any room with at least one current
        viewer, and rooms owned by the calling user (so a creator's own empty
        rooms remain visible to them). Anonymous callers see only presets,
        broadcasts, and non-empty rooms.

        Filtering happens in Python rather than the DB because viewer_count is
        sourced from comm-server, not the row itself; rooms are loaded as in
        KibitzRoomList and filtered after the batched count fetch.
      tags:
      - kibitz
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
