version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: LeagueCoreService/Dockerfile
    container_name: LeagueService
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=LeagueManager;Username=postgres;Password=muff0
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet: